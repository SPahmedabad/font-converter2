<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Professional Terafont to Unicode</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 25px; font-family: sans-serif; }
        .converter-box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { font-size: 16px; line-height: 1.7; border-radius: 6px; padding: 12px; border: 1px solid #ced4da; }
        .btn-run { margin-top: 15px; font-weight: bold; font-size: 18px; padding: 12px; }
        h2 { color: #d9534f; font-weight: bold; margin-bottom: 20px; }
        label { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="converter-box col-md-12">
            <h2 class="text-center">Terafont Aakash to Unicode (Final Engine)</h2>
            <hr>
            <div class="row">
                <div class="col-md-6">
                    <label>1. પેસ્ટ કરો (Terafont Aakash):</label>
                    <textarea id="src" class="form-control" rows="18" placeholder="તમારું લખાણ અહીં પેસ્ટ કરો..."></textarea>
                    <button id="btn-convert" class="btn btn-danger btn-block btn-run">રૂપાંતર કરો (CONVERT)</button>
                </div>
                <div class="col-md-6">
                    <label>2. શ્રુતિ/યુનિકોડ પરિણામ:</label>
                    <textarea id="dst" class="form-control" rows="22" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        const aakashMap = {
            // નંબર્સ અને ચિહ્નો
            "!": "૧", "#": "૩", "$": "૪", "%": "પ્", "&": "૬", "'": "ૃ", "(": "મ", ")": "ફ", "*": "૭", 
            "+": "ત્ર", ",": "લ", "-": "ઢ", ".": "ઈ", "/": "ળ", "0": "ડ", "1": "ક્ષ", "2": "જ્ઞ", 
            "3": "ઘ", "4": ",", "5": "પ", "6": "ણ", "7": "જ્ઞ", "8": "ટ", "9": "ઠ", ":": "સ્", 
            ";": "સ", "<": "લ્", "=": "્ર", ">": "ઈ", "?": "ળ્", "@": "%", "_": "૦", "P": ".", 
            "v": " - ", "s": "(", "f": ")", "q": "્", "|": "્ર", "x": "શ્", "m": " ",

            // સ્વર અને વ્યંજન (Capital & Small)
            "A": "બ", "B": "ખ", "C": "હ", "D": "મ", "E": "ભ", "F": "ા", "G": "ન", "H": "જ", 
            "I": "ય", "J": "વ", "K": "છ", "L": "ી", "M": "ો", "N": "દ", "O": "ફ", "R": "ચ", 
            "S": "ક", "T": "ત", "U": "ગ", "V": "અ", "W": "ધ", "X": "શ", "Y": "થ", "Z": "ર", 
            "[": "ે", "\\": "ં", "]": "ુ", "^": "ણ્", "a": "બ્", "b": "ક્", "d": "મ્", "e": "ભ્", 
            "g": "ન્", "h": "ઝ", "i": "ય્", "j": "વ્", "k": "ઋ", "p": "ઉ", "t": "ત્", "z": "શ્ર", 
            
            // વિશિષ્ટ માત્રાઓ અને જોડાક્ષરો
            "l": "િ", "Ä": "િં", "o": "ઃ", "r": "ચ્", "Ÿ": "્", "u": "જ્ઞ", "w": "ઘ્",
            "~": "રૂ", "}": "ૂ", "Ò": "જી", "æ": "હ્ય્", "£": "દ્વ", "ã": "દ્ર", "ß": "જ્", "\"": "ર્", "Q": "ષ્"
        };

        $("#btn-convert").click(function() {
            let txt = $("#src").val();
            if (!txt) { $("#dst").val(""); return; }
            $("#dst").val(processEngine(txt));
        });

        function processEngine(input) {
            let mapped = "";
            
            // 1. ડાયનામિક ગ્લાયફ કન્વર્ઝન
            for (let i = 0; i < input.length; i++) {
                let char = input[i];
                
                // હ્રસ્વ 'િ' (l) નું સ્માર્ટ ક્લસ્ટર લોજિક
                if (char === "l") {
                    let cluster = "";
                    let j = i + 1;
                    while (j < input.length) {
                        let nextChar = input[j];
                        let m = aakashMap[nextChar] || nextChar;
                        cluster += m;
                        // જો અક્ષર '્' (હલંત) થી પૂરો થતો હોય, તો તે અડધો અક્ષર છે (ક્લસ્ટર ચાલુ રહેશે)
                        if (m.endsWith("્")) {
                            j++;
                        } else {
                            j++;
                            break;
                        }
                    }
                    mapped += cluster + "િ";
                    i = j - 1;
                    continue;
                }

                mapped += aakashMap[char] || char;
            }

            // 2. રેફ 'ર્' ને સાચી જગ્યાએ સેટ કરવાનું રેગ્યુલર એક્સપ્રેશન
            const cons = "કખગઘઙચછજઝઞટઠડઢણતથદધનપફબભમયરલળવશષસહક્ષજ્ઞ";
            let regexReph = new RegExp("([" + cons + "](?:્[" + cons + "])*[ાિીુૂૃેૈોૌંઃ]*)(ર્)", "g");
            mapped = mapped.replace(regexReph, "ર્$1");

            // 3. ગુજરાતી વ્યાકરણ અને ટાઈપિંગ મિસ્ટેકનું શુદ્ધિકરણ (Post-Processing)
            mapped = mapped.replace(/અા/g, "આ")
                           .replace(/અે/g, "એ")
                           .replace(/અો/g, "ઓ")
                           .replace(/અૈ/g, "ઐ")
                           .replace(/અૌ/g, "ઔ")
                           .replace(/િિ/g, "િ")
                           .replace(/ુુ/g, "ુ")
                           .replace(/જ્ઞયા/g, "જ્ઞા")
                           .replace(/ગુરૂ/g, "ગુરુ");

            return mapped;
        }
    </script>
</body>
</html>
