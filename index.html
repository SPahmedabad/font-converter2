<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <title>Gujarati Font Converter</title>
</head>
<body>
  <div class="container" style="width:100%">
    <div class="page-header">
      <h2>Terafont Aakash to Unicode Converter</h2>
    </div>
    <div class="row">
      <div class="col-md-6">
        <h4>1. Select Font & Paste Text:</h4>
        <div class="form-group">
          <select id="ddl-src-font" class="form-control">
            <option value="">-- Click to Load Mapping --</option>
          </select>
        </div>
        <div class="form-group">
          <textarea class="form-control" id="src" rows="18" placeholder="Paste your Terafont text here..."></textarea>
        </div>
        <button id="btn-convert" class="btn btn-primary btn-block">Click to Convert Now</button>
      </div>
      <div class="col-md-6">
        <h4>2. Converted Unicode Text:</h4>
        <textarea id="dst" class="form-control" rows="21" readonly placeholder="Result will appear here..."></textarea>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script>
    // Update these paths to match your actual GitHub structure exactly
    var srcFonts = [{
      text: "Terafont Aakash / Kinnari",
      value: "static/mapping/terafont-kinnari.json"
    }];

    $(function() {
      for (var i = 0; i < srcFonts.length; i++) {
        $("#ddl-src-font").append('<option value="' + srcFonts[i].value + '">' + srcFonts[i].text + '</option>');
      }
    });

    var map;

    // Load JSON Mapping
    $("#ddl-src-font").change(function() {
      var jsonPath = $(this).val();
      if (!jsonPath) return;

      $.getJSON(jsonPath, function(data) {
        map = data;
        alert("Success: Font mapping loaded!");
        console.log("Mapping Data Loaded:", map);
      }).fail(function(jqxhr, textStatus, error) {
        var err = textStatus + ", " + error;
        alert("Error: Could not load JSON file. Check Console (F12).");
        console.error("Request Failed: " + err);
      });
    });

    // Manual Button Click
    $("#btn-convert").click(function() {
      if (!map) {
        alert("Please select a font from the dropdown first!");
        return;
      }
      transform();
    });

    function transform() {
      var txt = $("#src").val();
      if (!txt) { $("#dst").val(""); return; }

      var newTxt = "",
        indexToForward = -1,
        forwardChars = map["forwardChars"] || [],
        forwardSkipChars = map["forwardSkipChars"] || [],
        backwardChars = map["backwardChars"] || [],
        comboChars = map["comboChars"] || {};

      for (var i = 0; i < txt.length; i++) {
        var char = txt[i],
          newChar = map[char] || char;

        if (backwardChars.indexOf(newChar) >= 0) {
          var l = newTxt.length;
          newTxt = newTxt.substr(0, l - 1) + newChar + newTxt[l - 1];
        } else if (startsWithAny(forwardSkipChars, newChar) && endsWithAny(forwardChars, newTxt)) {
          var l = newTxt.length;
          newTxt = newTxt.substr(0, l - 1) + newChar + newTxt[l - 1];
        } else {
          newTxt += newChar;
        }

        var comboKey = endsWithAnyProp(comboChars, newTxt);
        if (comboKey) {
          newTxt = newTxt.replace(new RegExp(comboKey + '$'), comboChars[comboKey]);
        }

        if (indexToForward >= 0) {
          if (!endsWithAny(forwardSkipChars, newChar)) {
            newTxt = newTxt.substr(0, indexToForward) + newTxt.substr(indexToForward + 1) + newTxt[indexToForward];
            indexToForward = -1;
          }
        }

        if (forwardChars.indexOf(newChar) >= 0) {
          indexToForward = newTxt.length - 1;
        }
      }
      $("#dst").val(newTxt);
    }

    function endsWithAny(list, str) {
      for (var i = 0; i < list.length; i++) {
        if (str.endsWith(list[i])) return true;
      }
      return false;
    }

    function endsWithAnyProp(obj, str) {
      for (var key in obj) {
        if (str.endsWith(key)) return key;
      }
      return null;
    }

    function startsWithAny(list, str) {
      for (var i = 0; i < list.length; i++) {
        if (str.startsWith(list[i])) return true;
      }
      return false;
    }
  </script>
</body>
</html>
