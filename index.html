<!DOCTYPE html>
<html lang="gu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aakash To Unicode Converter</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<style>

body{
    background:#f3f5f7;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

textarea{
    resize:vertical;
    font-size:18px;
    line-height:1.8;
    font-family:
    "Noto Sans Gujarati",
    "Shruti",
    sans-serif;
}

#btn-convert{
    margin-top:15px;
    font-weight:bold;
}

h2{
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-10 col-md-offset-1">

<div class="card">

<h2 class="text-center text-primary">
Terafont Aakash → Unicode Converter
</h2>

<div class="row">

<div class="col-md-6">

<h4>Source (Aakash Font)</h4>

<textarea
id="src"
class="form-control"
rows="24"
placeholder="Paste Aakash font text here..."></textarea>

<button
id="btn-convert"
class="btn btn-success btn-lg btn-block">

CONVERT TO UNICODE

</button>

</div>

<div class="col-md-6">

<h4>Unicode Output</h4>

<textarea
id="dst"
class="form-control"
rows="24"
readonly
placeholder="Unicode Gujarati output..."></textarea>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

const map = {

"A":"બ",
"B":"ખ",
"C":"હ",
"D":"મ",
"E":"ભ",
"F":"ા",
"G":"ન",
"H":"જ",
"I":"ય",
"J":"વ",
"K":"છ",
"L":"ી",
"M":"ો",
"N":"દ",
"O":"ફ",
"P":"઼",
"Q":"ષ્",
"R":"ચ",
"S":"ક",
"T":"ત",
"U":"ગ",
"V":"અ",
"W":"ધ",
"X":"શ",
"Y":"થ",
"Z":"ર",

"a":"બ્",
"b":"ક્",
"c":"ઁ",
"d":"મ્",
"e":"ભ્",
"f":")",
"g":"ન્",
"h":"ઝ",
"i":"ય્",
"j":"વ્",
"k":"ઋ",
"l":"િ",
"m":"ં",
"n":"ં",
"o":"ો",
"p":"પ",
"q":"્",
"r":"ર",
"s":"(",
"t":"ત્",
"u":"ુ",
"v":"-",
"w":"ૂ",
"x":"ષ",
"y":"્ય",
"z":"શ્ર",

"0":"ડ",
"1":"ક્ષ",
"2":"૨",
"3":"ઘ",
"4":"૪",
"5":"પ",
"6":"ણ",
"7":"જ્ઞ",
"8":"ટ",
"9":"ઠ",

"!":"૧",
"@":"૨",
"#":"૩",
"$":"૪",
"%":"૫",
"^":"૬",
"&":"૭",
"*":"૮",
"(":"૯",
")":"૦",

"|":"્ર",
"[":"ે",
"]":"ુ",
"{":"ૈ",
"}":"ૌ",

";":"સ",
":":"સ્",

"<":"લ્",
">":"ઇ",

"/":"ળ",
"?":"ળ્",

"~":"રૂ",

"£":"દ્વ",
"ã":"દ્ર",
"Ÿ":"્યો",
"Ô":"જ",
"Ò":"જી",
"Ê":"ક્ર",
"Þ":"છે",
"‰":"દ્ધ",
"™":"ત્ર",
"•":"પ્ર",
"†":"ત્ત",

"Ä":"દ્ધ",
"Å":"ક્ષ",
"Æ":"જ્ઞ",

"\\":"",
"`":"",

"“":"",
"”":"",

"‘":"",
"’":""

};

function convertAakash(input){

let text = input;

/* =========================================
   STEP 1 : BASIC CHARACTER MAPPING
========================================= */

let out = "";

for(let i=0;i<text.length;i++){

let ch = text[i];

out += map[ch] || ch;

}

/* =========================================
   STEP 2 : FIX I MATRA
========================================= */

out = out.replace(/([ક-હ])િ/g,"િ$1");

out = out.replace(/([ક-હ]્[ક-હ])િ/g,function(m){

return "િ"+m.replace("િ","");

});

/* =========================================
   STEP 3 : FIX REPH
========================================= */

out = out.replace(/ર્([ક-હ])/g,"$1્ર");

/* =========================================
   STEP 4 : COMMON CONJUNCT FIXES
========================================= */

const fixes = {

"પ|":"પ્ર",
"ભ|":"ભ્ર",
"ક|":"ક્ર",
"ગ|":"ગ્ર",
"દ|":"દ્ર",
"ત|":"ત્ર",
"શ|":"શ્ર",
"જ|":"જ્ર",

"પ્િર":"પ્રિ",
"પ્િરય":"પ્રિય",

"િવષ્ણુ":"વિષ્ણુ",
"િદશા":"દિશા",
"િચંતા":"ચિંતા",
"િહમાલય":"હિમાલય",
"િહર":"હરિ",

"દ્વારપા,":"દ્વારપાલ",

"રાએકાસ":"રાક્ષસ",
"મંકરી":"મશ્કરી",

"એકા":"એક",
"એકીર":"ક્ષીર",

"પદ્વાર":"ઉદ્ધાર",

"ૂં":"ું",
"ંા":"ાં",
"ંિ":"િં",
"ંી":"ીં",
"ંુ":"ું",
"ંૂ":"ૂં",
"ંે":"ેં",

"।।":"॥",
"।।।।":"॥",

"્્":"્",

"  ":" "

};

for(let k in fixes){

out = out.split(k).join(fixes[k]);

}

/* =========================================
   STEP 5 : REMOVE GARBAGE
========================================= */

out = out.replace(/[\\]/g,"");

out = out.replace(/઼/g,"");

out = out.replace(/�/g,"");

out = out.replace(/¥/g,"");

out = out.replace(/¤/g,"");

/* =========================================
   STEP 6 : FINAL CLEANUP
========================================= */

out = out.replace(/\s+/g," ");

return out;

}

/* =========================================
   BUTTON CLICK
========================================= */

$("#btn-convert").click(function(){

let src = $("#src").val();

let result = convertAakash(src);

$("#dst").val(result);

});

</script>

</body>

</html>
