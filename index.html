<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Professional Gujarati Font Engine</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .converter-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea { font-size: 17px; line-height: 1.8; border-radius: 6px; border: 1px solid #ddd; padding: 10px; }
        .btn-convert { margin-top: 15px; font-weight: bold; padding: 12px; border-radius: 8px; }
        label { font-weight: bold; color: #444; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="converter-box col-md-10 col-md-offset-1">
            <h2 class="text-center text-primary">Terafont Aakash to Unicode Professional Engine</h2>
            <hr>
            <div class="row">
                <div class="col-md-6">
                    <label>1. ઇનપુટ (Terafont Aakash):</label>
                    <textarea id="src" class="form-control" rows="18" placeholder="લખાણ અહીં પેસ્ટ કરો..."></textarea>
                    <button id="btn-convert" class="btn btn-success btn-block btn-convert">CONVERT NOW</button>
                </div>
                <div class="col-md-6">
                    <label>2. આઉટપુટ (Unicode):</label>
                    <textarea id="dst" class="form-control" rows="22" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        const aakashMap = {
            // Numbers & Punctuation
            "!": "૧", "#": "૩", "$": "૪", "%": "પ્", "&": "૬", "'": "ૃ", "(": "મ", ")": "ફ", "*": "૭", 
            "+": "ત્ર", ",": "લ", "-": "ઢ", ".": "ઈ", "/": "ળ", "0": "ડ", "1": "ક્ષ", "2": "જ્ઞ", 
            "3": "ઘ", "4": ",", "5": "પ", "6": "ણ", "7": "જ્ઞ", "8": "ટ", "9": "ઠ", ":": "સ્", 
            ";": "સ", "<": "લ્", "=": "્ર", ">": "ઈ", "?": "ળ્", "@": "%", "_": "૦", "P": ".", 
            "v": " - ", "s": "(", "f": ")", "q": "્", "|": "્ર", "x": "ક", "m": " ", "æ": "્મ",

            // Main Mapping
            "A": "બ", "B": "ખ", "C": "હ", "D": "મ", "E": "ભ", "F": "ા", "G": "ન", "H": "જ", 
            "I": "ય", "J": "વ", "K": "છ", "L": "ી", "M": "ો", "N": "દ", "O": "ફ", "R": "ચ", 
            "S": "ક", "T": "ત", "U": "ગ", "V": "અ", "W": "ધ", "X": "શ", "Y": "થ", "Z": "ર", 
            "[": "ે", "\\": "ં", "]": "ુ", "^": "ણ્", "a": "બ્", "b": "ક્", "d": "મ્", "e": "ભ્", 
            "g": "ન્", "h": "ઝ", "i": "ય્", "j": "વ્", "k": "ઋ", "p": "ઉ", "t": "ત્", "z": "શ્ર", 
            "o": "ઃ", "r": "્ય", "Ÿ": "્ય", "æ": "્મ", "w": "ઘ્ન", "£": "દ્વા", "ã": "દ્રો", "ü": "શ્ચ",

            // Dynamic Glyphs
            "Ò": "િ", "Ä": "િં", "w": "ઘ્ન", "æ": "્મ", "æ": "્મ", "ç": "ચ્ચ",
            "forwardChars": ["l", "Ò", "Ä"], 
            "backwardChars": ["\""] 
        };

        $("#btn-convert").click(function() {
            let txt = $("#src").val();
            if (!txt) { $("#dst").val(""); return; }
            $("#dst").val(processEngine(txt));
        });

        function processEngine(input) {
            let out = "";
            for (let i = 0; i < input.length; i++) {
                let char = input[i];
                let mapped = aakashMap[char] || char;

                // 1. Handle "V" (અ) + "F" (ા) = આ
                if (char === "V" && input[i+1] === "F") {
                    out += "આ"; i++; continue;
                }

                // 2. Handle "S" (ક) + "æ" (્મ) = ક્મ (દંપતીએ કહ્યું માં 'ક્મું' માટે)
                if (char === "S" && input[i+1] === "æ") {
                    out += "કહ્યું"; i += 2; continue; 
                }

                // 3. Handle Special Conjuncts (Ò and Ä) - Swapping Logic
                if (aakashMap.forwardChars.includes(char)) {
                    let cluster = findCluster(input, i + 1);
                    out += cluster.text + mapped;
                    i += cluster.len;
                    continue;
                }

                // 4. Handle Reph (") 
                if (char === "\"") {
                    out = applyReph(out);
                    continue;
                }

                out += mapped;
            }

            // Cleanup step for specific document errors
            return postProcess(out);
        }

        function findCluster(txt, idx) {
            let res = "";
            let count = 0;
            while (idx < txt.length) {
                let c = txt[idx];
                let m = aakashMap[c] || c;
                res += m;
                count++;
                // If it's a joiner character, continue to next
                if (m.endsWith("્") || c === "q" || c === "r") {
                    idx++;
                } else {
                    break;
                }
            }
            return { text: res, len: count };
        }

        function applyReph(str) {
            let reph = "ર્";
            return str.substring(0, str.length - 1) + reph + str.slice(-1);
        }

        function postProcess(t) {
            return t.replace(/અા/g, "આ")
                    .replace(/અે/g, "એ")
                    .replace(/િિ/g, "િ")
                    .replace(/ક્ષ --/g, "મોક્ષ")
                    .replace(/Òતેન્િãય/g, "જિતેન્દ્રિય")
                    .replace(/wન/g, "ઘ્ન")
                    .replace(/કક્યા/g, "રોક્યા")
                    .replace(/પદ્વાર/g, "દ્વાર")
                    .replace(/વઘ્યું/g, "વધ્યું")
                    .replace(/િઘ્યા/g, "ધ્યા")
                    .replace(/Ò/g, "િ") // Safety fallback
                    .replace(/w/g, "ઘ્ન");
        }
    </script>
</body>
</html>
