<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="utf-8">
    <title>Professional Terafont to Unicode</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; padding: 30px; font-family: 'Segoe UI', sans-serif; }
        .main-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        textarea { font-size: 16px; line-height: 1.8; border-radius: 8px; resize: vertical; }
        .header-title { color: #1a73e8; font-weight: bold; margin-bottom: 25px; }
        .btn-run { background: #1a73e8; color: white; font-weight: bold; padding: 15px; font-size: 18px; transition: 0.3s; }
        .btn-run:hover { background: #1557b0; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card col-md-12">
        <h2 class="text-center header-title">Terafont Aakash Professional Converter</h2>
        <div class="row">
            <div class="col-md-6">
                <label>Input (Terafont Aakash):</label>
                <textarea id="input" class="form-control" rows="15" placeholder="Paste your 200 pages here..."></textarea>
                <button onclick="runConversion()" class="btn btn-block btn-run" style="margin-top:15px">CONVERT FULL TEXT</button>
            </div>
            <div class="col-md-6">
                <label>Output (Unicode):</label>
                <textarea id="output" class="form-control" rows="19" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
const map = {
    // Basic Consonants
    "A":"બ", "B":"ખ", "C":"હ", "D":"મ", "E":"ભ", "G":"ન", "H":"જ", "I":"ય", "J":"વ", "K":"છ", "L":"ી", "N":"દ", "O":"ફ", "R":"ચ", "S":"ક", "T":"ત", "U":"ગ", "V":"અ", "W":"ધ", "X":"શ", "Y":"થ", "Z":"ર", "3":"ઘ", "5":"પ", "6":"ણ", "8":"ટ", "9":"ઠ", "0":"ડ", "-":"ઢ", "1":"ક્ષ", "2":"જ્ઞ", "7":"જ્ઞ", ";":"સ", ":":"સ્", "/":"ળ", "z":"શ્ર", "+":"ત્ર", ",":"લ", "<":"લ્", "x":"ક",

    // Vowels & Matras
    "F":"ા", "[":"ે", "]":"ુ", "}":"ૂ", "\\":"ં", "'":"ૃ", "o":"ઃ", "q":"્", "r":"્ય", "Ÿ":"્ય", "=":"્ર", "|":"્ર",

    // Complex Glyphs
    "æ":"હ્ય", "w":"ઘ્ન", "ã":"દ્રો", "ü":"શ્ચ", "£":"દ્વા", "ç":"ચ્ચ", "Ò":"િ", "Ä":"િં",

    // Punctuation & Numbers
    "!":"૧", "#":"૩", "$":"૪", "%":"૫", "&":"૬", "*":"૭", "(":"૮", ")":"૯", "_":"૦", "P":".", "v":" - ", "m":" "
};

function runConversion() {
    let src = document.getElementById("input").value;
    document.getElementById("output").value = engine(src);
}

function engine(text) {
    let res = "";
    const preMatras = ["l", "Ò", "Ä"]; // Matras that appear before consonant
    const reph = "\""; // Reph char

    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        
        // 1. Handle "V" combinations (અ, આ, એ, ઉ, ઊ)
        if (char === "V") {
            let next = text[i+1];
            if (next === "F") { res += "આ"; i++; continue; }
            if (next === "[") { res += "એ"; i++; continue; }
            if (next === "]") { res += "ઉ"; i++; continue; }
            if (next === "}") { res += "ઊ"; i++; continue; }
            res += "અ"; continue;
        }

        // 2. Handle Pre-fixed Matras (િ, િં)
        if (preMatras.includes(char)) {
            let cluster = getCluster(text, i + 1);
            res += cluster.text + (map[char] || "િ");
            i += cluster.len;
            continue;
        }

        // 3. Handle Reph (")
        if (char === reph) {
            // Reph logic: it belongs after the next cluster
            let cluster = getCluster(text, i + 1);
            res += cluster.text + "ર્";
            i += cluster.len;
            continue;
        }

        res += map[char] || char;
    }

    // Post-processing for very specific cases like 'kahnuyu' (Sæ]\)
    return res.replace(/કહ્ય/g, "કહ્યું")
              .replace(/શક્યIF/g, "શક્યા")
              .replace(/િિ/g, "િ")
              .replace(/ઃખ/g, "ઃખ")
              .replace(/અા/g, "આ")
              .replace(/અે/g, "એ");
}

function getCluster(text, idx) {
    let clusterText = "";
    let count = 0;
    while (idx < text.length) {
        let c = text[idx];
        let m = map[c] || c;
        
        // Check if current char is a half-letter or a joiner
        let isHalf = (c === c.toLowerCase() && /[a-z]/.test(c)) || c === "q" || c === "r" || c === "Ÿ";
        
        clusterText += m;
        count++;
        
        if (!isHalf) break; // If it's a full consonant, the cluster ends
        idx++;
    }
    return { text: clusterText, len: count };
}
</script>

</body>
</html>
