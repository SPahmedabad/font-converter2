<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Final Terafont Aakash Converter</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; font-family: sans-serif; }
        .main-box { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        textarea { font-size: 17px; line-height: 1.6; border: 1px solid #ccc; border-radius: 5px; }
        .btn-convert { margin-top: 15px; font-size: 18px; font-weight: bold; }
        h2 { color: #d9534f; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="col-md-10 col-md-offset-1 main-box">
            <h2 class="text-center">Professional Terafont Aakash to Unicode</h2>
            <div class="row">
                <div class="col-md-6">
                    <label>ટેરાફોન્ટ આકાશ લખાણ અહીં પેસ્ટ કરો:</label>
                    <textarea id="src" class="form-control" rows="20" placeholder="અહીં પેસ્ટ કરો..."></textarea>
                    <button id="btn-convert" class="btn btn-danger btn-block btn-convert">રૂપાંતરિત કરો (CONVERT)</button>
                </div>
                <div class="col-md-6">
                    <label>યુનિકોડ (ગુજરાતી) રિઝલ્ટ:</label>
                    <textarea id="dst" class="form-control" rows="23" readonly placeholder="અહીં પરિણામ આવશે..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        const aakashMap = {
            "!": "૧", "\"": "\u0AB0\u0ACD", "#": "૩", "$": "૪", "%": "પ્",
            "&": "૬", "'": "ૃ", "(": "મ", ")": "ફ", "*": "૭",
            "+": "ત્ર", ",": "લ", "-": "ઢ", ".": "ઈ", "/": "ળ",
            "0": "ડ", "1": "ક્ષ", "2": "જ્ઞ", "3": "ઘ", "4": ",", "5": "પ",
            "6": "ણ", "7": "જ્ઞ", "8": "ટ", "9": "ઠ", ":": "સ્",
            ";": "સ", "<": "લ્", "=": "્ર", ">": "ઈ", "?": "ળ્",
            "@": "%", "A": "બ", "B": "ખ", "C": "હ", "D": "મ",
            "E": "ભ", "F": "ા", "G": "ન", "H": "જ", "I": "ય",
            "J": "વ", "K": "છ", "L": "ી", "M": "ો", "N": "દ",
            "O": "ફ", "P": ".", "Q": "ષ્ર્", "R": "ચ", "S": "ક",
            "T": "ત", "U": "ગ", "V": "અ", "W": "ધ", "X": "શ",
            "Y": "થ", "Z": "ર", "[": "ે", "\\": "ં", "]": "ુ",
            "^": "ણ્", "_": "૦", "a": "બ્", "b": "ક્", "d": "મ્",
            "e": "ભ્", "g": "ન્", "h": "ઝ", "i": "ય્", "j": "વ્",
            "k": "ઋ", "l": "િ", "p": "ઉ", "t": "ત્", "z": "શ્ર",
            "~": "રૂ", "v": " - ", "s": "(", "f": ")", "q": "્",
            "|": "્ર", "o": "ો", "u": "જ્ઞ",
            "forwardChars": ["િ"],
            "backwardChars": ["\""],
            "comboChars": {
                "p|": "પ્ર", "પ|": "પ્ર", "ગ|": "ગ્ર", "ભ|": "ભ્ર", "મ|": "મ્ર",
                "દ|": "દ્ર", "બ|": "બ્ર", "કæું": "કહ્યું", "પપ": "ઉપ", "પદ": "ઉદ",
                "~": "રૂ"
            }
        };

        $("#btn-convert").click(function() {
            let txt = $("#src").val();
            if (!txt) { $("#dst").val(""); return; }

            let newTxt = "";
            let indexToForward = -1;

            for (let i = 0; i < txt.length; i++) {
                let char = txt[i];
                let newChar = aakashMap[char] || char;

                // Handle Reph (Double quotes)
                if (aakashMap.backwardChars.includes(newChar)) {
                    let len = newTxt.length;
                    newTxt = newTxt.substring(0, len - 1) + newChar + newTxt[len - 1];
                } else {
                    newTxt += newChar;
                }

                // Handle 'i' matra swap logic
                if (indexToForward >= 0) {
                    let charsArray = newTxt.split("");
                    let vowel = charsArray.splice(indexToForward, 1)[0];
                    charsArray.push(vowel);
                    newTxt = charsArray.join("");
                    indexToForward = -1;
                }

                if (aakashMap.forwardChars.includes(newChar)) {
                    indexToForward = newTxt.length - 1;
                }

                // Handle Conjuncts like p| -> પ્ર
                for (let key in aakashMap.comboChars) {
                    if (newTxt.endsWith(key)) {
                        newTxt = newTxt.replace(new RegExp(escapeRegExp(key) + '$'), aakashMap.comboChars[key]);
                    }
                }
            }
            $("#dst").val(newTxt);
        });

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>
</html>
