<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Professional Gujarati Font Engine</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .converter-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea { font-size: 17px; line-height: 1.8; border-radius: 6px; border: 1px solid #ddd; padding: 10px; }
        .btn-convert { margin-top: 15px; font-weight: bold; padding: 12px; border-radius: 8px; font-size: 18px; }
        label { font-weight: bold; color: #444; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="converter-box col-md-12">
            <h2 class="text-center text-primary" style="margin-bottom: 25px;">Terafont Aakash to Unicode Engine</h2>
            <div class="row">
                <div class="col-md-6">
                    <label>1. ઇનપુટ (Terafont Aakash લખાણ પેસ્ટ કરો):</label>
                    <textarea id="src" class="form-control" rows="18" placeholder="લખાણ અહીં પેસ્ટ કરો..."></textarea>
                    <button id="btn-convert" class="btn btn-success btn-block btn-convert">CONVERT NOW</button>
                </div>
                <div class="col-md-6">
                    <label>2. આઉટપુટ (Unicode / શ્રુતિ રિઝલ્ટ):</label>
                    <textarea id="dst" class="form-control" rows="22" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        // સંપૂર્ણ મેપિંગ - કોઈ હાર્ડકોડિંગ વિના
        const aakashMap = {
            "!": "૧", "#": "૩", "$": "૪", "%": "પ્", "&": "૬", "'": "ૃ", "(": "મ", ")": "ફ", "*": "૭", 
            "+": "ત્ર", ",": "લ", "-": "ઢ", ".": "ઈ", "/": "ળ", "0": "ડ", "1": "ક્ષ", "2": "જ્ઞ", 
            "3": "ઘ", "4": ",", "5": "પ", "6": "ણ", "7": "જ્ઞ", "8": "ટ", "9": "ઠ", ":": "સ્", 
            ";": "સ", "<": "લ્", "=": "્ર", ">": "ઈ", "?": "ળ્", "@": "%", "_": "૦", "P": ".", 
            "v": " - ", "s": "(", "f": ")", "q": "્", "|": "્ર", "x": "શ્", "m": "?",

            "A": "બ", "B": "ખ", "C": "હ", "D": "મ", "E": "ભ", "F": "ા", "G": "ન", "H": "જ", 
            "I": "ય", "J": "વ", "K": "છ", "L": "ી", "M": "ો", "N": "દ", "O": "ફ", "R": "ચ", 
            "S": "ક", "T": "ત", "U": "ગ", "V": "અ", "W": "ધ", "X": "શ", "Y": "થ", "Z": "ર", 
            "[": "ે", "\\": "ં", "]": "ુ", "^": "ણ્", "a": "બ્", "b": "ક્", "d": "મ્", "e": "ભ્", 
            "g": "ન્", "h": "ઝ", "i": "ય્", "j": "વ્", "k": "ઋ", "p": "ઉ", "t": "ત્", "z": "શ્ર", 
            
            // Special Identifiers from your text
            "l": "િ", "Ä": "િં", "o": "ઃ", "r": "ચ્", "Ÿ": "્", "u": "જ્ઞ", "w": "ઘ્",
            "~": "રૂ", "}": "ૂ", "Ò": "જી", "æ": "હ્ય્", "£": "દ્વ", "ã": "દ્ર", "ß": "જ્", "\"": "ર્"
        };

        $("#btn-convert").click(function() {
            let txt = $("#src").val();
            if (!txt) { $("#dst").val(""); return; }
            $("#dst").val(processEngine(txt));
        });

        function processEngine(input) {
            let mapped = "";
            
            // 1. Basic 1-to-1 Mapping
            for (let i = 0; i < input.length; i++) {
                let char = input[i];
                mapped += aakashMap[char] || char;
            }

            // ગુજરાતી વ્યંજનોનું લિસ્ટ (Cluster ઓળખવા માટે)
            const cons = "કખગઘઙચછજઝઞટઠડઢણતથદધનપફબભમયરલળવશષસહક્ષજ્ઞ";
            
            // 2. હ્રસ્વ 'િ' અને 'િં' ને સાચી જગ્યાએ સેટ કરવાનું લોજિક (દા.ત. િહંસક -> હિંસક)
            let regexForward = new RegExp("(િ|િં)([" + cons + "](?:્[" + cons + "])*)(ં)?", "g");
            mapped = mapped.replace(regexForward, "$2$1$3");

            // 3. રેફ 'ર્' ને સાચી જગ્યાએ સેટ કરવાનું લોજિક (દા.ત. દુજર્ન -> દુર્જન)
            let regexReph = new RegExp("([" + cons + "](?:્[" + cons + "])*)(ર્)", "g");
            mapped = mapped.replace(regexReph, "$2$1");

            // 4. માત્રાઓ અને શબ્દોનું શુદ્ધિકરણ (Post-Processing)
            mapped = mapped.replace(/અા/g, "આ")
                           .replace(/અે/g, "એ")
                           .replace(/અો/g, "ઓ")
                           .replace(/અૈ/g, "ઐ")
                           .replace(/અૌ/g, "ઔ")
                           .replace(/િિ/g, "િ")
                           .replace(/ુુ/g, "ુ")
                           .replace(/ગુરૂ/g, "ગુરુ")
                           .replace(/નહિં/g, "નહીં")
                           .replace(/જીતેન્દ્રિય/g, "જિતેન્દ્રિય")
                           .replace(/બ્રાહ્ય્ણ/g, "બ્રાહ્મણ") // બ્રાæણ માટે સુધારો
                           .replace(/ક્ષ, લોકનો/g, "મોક્ષ લોકનો"); // તમારી ક્ષ ની ટાઈપિંગ મિસ્ટેક માટે

            return mapped;
        }
    </script>
</body>
</html>
