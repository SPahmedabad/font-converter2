<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aakash To Unicode Converter</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<style>

body{
    background:#f3f5f7;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

textarea{
    resize:vertical;
    font-size:18px;
    line-height:1.8;
    font-family:
    "Noto Sans Gujarati",
    "Shruti",
    sans-serif;
}

#btn{
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-10 col-md-offset-1">

<div class="card">

<h2 class="text-center text-primary">
Terafont Aakash → Unicode Converter
</h2>

<hr>

<div class="row">

<div class="col-md-6">

<h4>Source (Aakash Font)</h4>

<textarea id="src"
class="form-control"
rows="22"></textarea>

<button id="btn"
class="btn btn-success btn-lg btn-block">
CONVERT
</button>

</div>

<div class="col-md-6">

<h4>Unicode Output</h4>

<textarea id="dst"
class="form-control"
rows="22"
readonly></textarea>

</div>

</div>
</div>
</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

const map = {

"A":"બ",
"B":"ખ",
"C":"હ",
"D":"મ",
"E":"ભ",
"F":"ા",
"G":"ન",
"H":"જ",
"I":"ય",
"J":"વ",
"K":"છ",
"L":"ી",
"M":"ો",
"N":"દ",
"O":"ફ",
"P":".",
"Q":"ષ્",
"R":"ચ",
"S":"ક",
"T":"ત",
"U":"ગ",
"V":"અ",
"W":"ધ",
"X":"શ",
"Y":"થ",
"Z":"ર",

"a":"બ્",
"b":"ક્",
"c":"ઁ",
"d":"મ્",
"e":"ભ્",
"f":")",
"g":"ન્",
"h":"ઝ",
"i":"ય્",
"j":"વ્",
"k":"ઋ",
"l":"િ",
"m":"ં",
"n":"ં",
"o":"ો",
"p":"પ",
"q":"્",
"r":"ર",
"s":"(",
"t":"ત્",
"u":"ુ",
"v":"-",
"w":"ૂ",
"x":"ષ",
"y":"્ય",
"z":"શ્ર",

"0":"ડ",
"1":"ક્ષ",
"2":"૨",
"3":"ઘ",
"4":"૪",
"5":"પ",
"6":"ણ",
"7":"જ્ઞ",
"8":"ટ",
"9":"ઠ",

"!":"૧",
"@":"૨",
"#":"૩",
"$":"૪",
"%":"૫",
"^":"૬",
"&":"૭",
"*":"૮",
"(":"૯",
")":"૦",

"|":"્ર",
"[":"ે",
"]":"ુ",
"{":"ૈ",
"}":"ૌ",

";":"સ",
":":"સ્",

"<":"લ્",
">":"ઇ",

"/":"ળ",
"?":"ળ્",

"~":"રૂ",

"£":"દ્વ",
"ã":"દ્ર",
"Ÿ":"્યો",
"Ô":"જ",
"Ò":"જી",
"Ê":"ક્ર",
"Þ":"છે",
"‰":"દ્ધ",
"™":"ત્ર",
"•":"પ્ર",
"†":"ત્ત",

"Ä":"દ્ધ",
"Å":"ક્ષ",
"Æ":"જ્ઞ",
"Ç":"ત્ત",
"È":"શ્વ",

"€":"હ્ન",
"…":"હ્ય"

};

function convertAakash(text){

let out = "";

/* BASIC MAP */

for(let i=0;i<text.length;i++){

let ch = text[i];

out += map[ch] || ch;

}

/* =========================
   FIX I MATRA
========================= */

out = out.replace(/([ક-હ]્?)(િ)/g,"િ$1");

/* =========================
   FIX REPH
========================= */

out = out.replace(/ર્([ક-હ])/g,"$1્ર");

/* =========================
   FIX COMMON CONJUNCTS
========================= */

const fixes = {

"પ્ર":"પ્ર",
"ત્ર":"ત્ર",
"ક્ષ":"ક્ષ",
"જ્ઞ":"જ્ઞ",
"શ્ર":"શ્ર",
"દ્વ":"દ્વ",
"દ્ર":"દ્ર",

"કૃ":"કૃ",

"ંા":"ાં",
"ંિ":"િં",
"ંી":"ીં",
"ંુ":"ું",
"ંૂ":"ૂં",
"ંે":"ેં",

"્્":"્"

};

for(let k in fixes){

out = out.split(k).join(fixes[k]);

}

/* =========================
   REMOVE BAD CHARS
========================= */

out = out.replace(/¤/g,"");
out = out.replace(/�/g,"");

/* =========================
   CLEAN SPACES
========================= */

out = out.replace(/\s+/g," ");

return out;

}

$("#btn").click(function(){

let src = $("#src").val();

let result = convertAakash(src);

$("#dst").val(result);

});

</script>

</body>
</html>
