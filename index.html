<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Final Terafont Aakash to Unicode</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: sans-serif; }
        .converter-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { font-size: 16px; line-height: 1.7; border-radius: 8px; border: 1px solid #ced4da; }
        .btn-convert { margin-top: 20px; font-weight: bold; font-size: 18px; padding: 10px; }
        h2 { color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-10 col-md-offset-1">
                <div class="converter-card">
                    <h2 class="text-center">Terafont Aakash to Unicode (Gujarati)</h2>
                    <hr>
                    <div class="row">
                        <div class="col-md-6">
                            <h4>Source (Paste Aakash Font Here)</h4>
                            <textarea id="src" class="form-control" rows="18" placeholder="Paste your text here..."></textarea>
                            <button id="btn-convert" class="btn btn-primary btn-block btn-convert">Convert Now</button>
                        </div>
                        <div class="col-md-6">
                            <h4>Result (Unicode / Shruti)</h4>
                            <textarea id="dst" class="form-control" rows="21" readonly placeholder="Result will appear here..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        const aakashMap = {
            "!": "૧", "\"": "\u0AB0\u0ACD", "#": "૩", "$": "૪", "%": "પ્",
            "&": "૬", "'": "ૃ", "(": "મ", ")": "ફ", "*": "૭",
            "+": "ત્ર", ",": "લ", "-": "ઢ", ".": "ઈ", "/": "ળ",
            "0": "ડ", "1": "ક્ષ", "2": "જ્ઞ", "3": "ઘ", "4": ",", "5": "પ",
            "6": "ણ", "7": "જ્ઞ", "8": "ટ", "9": "ઠ", ":": "સ્",
            ";": "સ", "<": "લ્", "=": "્ર", ">": "ઈ", "?": "ળ્",
            "@": "%", "A": "બ", "B": "ખ", "C": "હ", "D": "મ",
            "E": "ભ", "F": "ા", "G": "ન", "H": "જ", "I": "ય",
            "J": "વ", "K": "છ", "L": "ી", "M": "ો", "N": "દ",
            "O": "ફ", "P": ".", "Q": "ષ્ર્", "R": "ચ", "S": "ક",
            "T": "ત", "U": "ગ", "V": "અ", "W": "ધ", "X": "શ",
            "Y": "થ", "Z": "ર", "[": "ે", "\\": "ં", "]": "ુ",
            "^": "ણ્", "_": "૦", "a": "બ્", "b": "ક્", "d": "મ્",
            "e": "ભ્", "g": "ન્", "h": "ઝ", "i": "ય્", "j": "વ્",
            "k": "ઋ", "l": "િ", "p": "ઉ", "t": "ત્", "z": "શ્ર",
            "~": "રૂ", "v": " - ", "s": "(", "f": ")", "q": "્",
            "|": "્ર", "o": "ો", "r": "્ય", "u": "જ્ઞ", "æ": "્મ", "w": "ઘ્",
            "forwardChars": ["િ"],
            "backwardChars": ["\""],
            "comboChars": {
                "p|": "પ્ર", "પ|": "પ્ર", "ગ|": "ગ્ર", "ભ|": "ભ્ર", "મ|": "મ્ર",
                "દ|": "દ્ર", "બ|": "બ્ર", "કæું": "કહ્યું", "પપ": "ઉપ", "પદ": "ઉદ",
                "~": "રૂ", "oખ": "દુઃખ", "oખી": "દુઃખી", "rયા": "ચ્યા", "Ÿયા": "ક્યા",
                "£ા": "દ્વા", "uયા": "જ્ઞા", "o": "ો"
            }
        };

        $("#btn-convert").click(function() {
            let txt = $("#src").val();
            if (!txt) { $("#dst").val(""); return; }

            let newTxt = "";
            let indexToForward = -1;

            for (let i = 0; i < txt.length; i++) {
                let char = txt[i];
                let newChar = aakashMap[char] || char;

                // Handle Reph (Double quotes)
                if (aakashMap.backwardChars.includes(newChar)) {
                    let len = newTxt.length;
                    if (len > 0) {
                        newTxt = newTxt.substring(0, len - 1) + newChar + newTxt[len - 1];
                    } else {
                        newTxt += newChar;
                    }
                } else {
                    newTxt += newChar;
                }

                // Handle 'i' matra swap logic
                if (indexToForward >= 0) {
                    let charsArray = newTxt.split("");
                    let vowel = charsArray.splice(indexToForward, 1)[0];
                    charsArray.push(vowel);
                    newTxt = charsArray.join("");
                    indexToForward = -1;
                }

                if (aakashMap.forwardChars.includes(newChar)) {
                    indexToForward = newTxt.length - 1;
                }

                // Handle Conjuncts and Special Replacements
                for (let key in aakashMap.comboChars) {
                    if (newTxt.endsWith(key)) {
                        newTxt = newTxt.replace(new RegExp(escapeRegExp(key) + '$'), aakashMap.comboChars[key]);
                    }
                }
            }
            // Final cleanup for common Rama-Charitra characters
            newTxt = newTxt.replace(/~/g, 'રૂ');
            newTxt = newTxt.replace(/oખ/g, 'દુઃખ');
            
            $("#dst").val(newTxt);
        });

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>
</html>
